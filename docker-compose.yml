# 天枢权衡 - Docker Compose 配置
# 支持单机部署和开发环境

services:
  # 主应用
  tianshu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tianshu-quanheng
    restart: unless-stopped

    # 环境变量（敏感信息通过 .env 文件配置）
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      # API 配置
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      # 调度配置
      - SCHEDULE_ENABLED=true
      # 飞书配置（如果启用）
      - FEISHU_WEBHOOK=${FEISHU_WEBHOOK:-}

    # 挂载数据卷（持久化数据）
    volumes:
      - ./五池管理:/app/五池管理
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro

    # 时区
    timezone: Asia/Shanghai

    # 调度任务（通过 command 覆盖）
    # 开发模式：直接运行
    command: python main.py status

    # 生产模式注释掉上面这行，取消下面这行的注释
    # command: python -m scheduler daemon

    # 网络
    networks:
      - tianshu-net

    # 健康检查
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s

  # 可选：Prometheus 监控（如果启用监控）
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: tianshu-prometheus
  #   restart: unless-stopped
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #   networks:
  #     - tianshu-net

  # 可选：Grafana 可视化（如果启用）
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: tianshu-grafana
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
  #   volumes:
  #     - ./docker/grafana:/var/lib/grafana
  #   networks:
  #     - tianshu-net
  #   depends_on:
  #     - prometheus

networks:
  tianshu-net:
    driver: bridge